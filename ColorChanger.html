<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Color Changer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #e0e0e0;
            line-height: 1.5;
        }

        .tool-card {
            max-width: 820px;
            width: 100%;
            background: #0b0b0b;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 2rem 1.8rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
            transition: border-color 0.2s;
        }

        .tool-card:focus-within {
            border-color: #944A32;
        }

        h1 {
            font-weight: 500;
            font-size: 1.9rem;
            letter-spacing: -0.01em;
            margin-bottom: 0.35rem;
            color: #ffffff;
        }

        .accent-line {
            height: 3px;
            width: 70px;
            background: #944A32;
            margin-bottom: 1.5rem;
            border-radius: 2px;
        }

        .info-text {
            color: #b0b0b0;
            font-size: 1rem;
            margin-bottom: 1.8rem;
            border-left: 3px solid #944A32;
            padding-left: 1rem;
            background: rgba(148, 74, 50, 0.08);
            border-radius: 0 8px 8px 0;
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 1.8rem;
            align-items: flex-end;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 180px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #aaaaaa;
        }

        .file-wrapper {
            position: relative;
            display: inline-block;
        }

        .file-label {
            display: inline-block;
            background: #1a1a1a;
            border: 1.5px solid #3a3a3a;
            color: #f0f0f0;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 450;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }

        .file-label:hover {
            border-color: #944A32;
            background: #1e1e1e;
            color: white;
        }

        .file-label:active {
            background: #2a2a2a;
        }

        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #141414;
            padding: 0.3rem 0.8rem 0.3rem 1rem;
            border-radius: 40px;
            border: 1.5px solid #3a3a3a;
        }

        .color-picker-wrapper:focus-within {
            border-color: #944A32;
        }

        .color-picker-wrapper label {
            margin-bottom: 0;
            color: #ccc;
        }

        input[type="color"] {
            width: 48px;
            height: 42px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 2px;
            border-radius: 30px;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #444;
            border-radius: 30px;
        }

        .action-btn {
            background: #1e1e1e;
            border: 1.5px solid #944A32;
            color: #ffffff;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(148, 74, 50, 0.15);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: #944A32;
            border-color: #944A32;
            color: white;
            box-shadow: 0 4px 12px rgba(148, 74, 50, 0.4);
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn:disabled {
            opacity: 0.45;
            border-color: #555;
            background: #1a1a1a;
            box-shadow: none;
            pointer-events: none;
            color: #888;
        }

        .canvas-area {
            background: #050505;
            border-radius: 18px;
            padding: 0.8rem;
            border: 1px solid #2c2c2c;
            margin: 1.2rem 0 1rem;
            display: flex;
            justify-content: center;
            min-height: 240px;
            /* checkerboard pattern to indicate transparency */
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #0a0a0a;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.6);
            background: transparent; /* canvas itself transparent */
            transition: box-shadow 0.2s;
        }

        .status-note {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
            color: #999;
            font-size: 0.9rem;
        }

        .hex-indicator {
            font-family: 'SF Mono', 'Menlo', monospace;
            background: #1a1a1a;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border-left: 4px solid #944A32;
            color: #ddd;
        }

        .footnote {
            margin-top: 1.2rem;
            text-align: right;
            font-size: 0.8rem;
            color: #666;
            border-top: 1px dashed #2a2a2a;
            padding-top: 1rem;
        }

        .footnote span {
            color: #944A32;
        }

        @media (max-width: 550px) {
            .tool-card { padding: 1.5rem; }
            h1 { font-size: 1.6rem; }
            .control-panel { flex-direction: column; align-items: stretch; gap: 1rem; }
            .file-label { width: 100%; text-align: center; }
            .color-picker-wrapper { justify-content: space-between; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="tool-card">
    <h1>Color Changer</h1>
    <div class="accent-line"></div>
    <div class="info-text">
        Upload an image. Non‑transparent pixels are replaced with the exact chosen color. 
        The result keeps full transparency.
    </div>

    <div class="control-panel">
        <div class="input-group">
            <label>Image source</label>
            <div class="file-wrapper">
                <span class="file-label">Choose image</span>
                <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp, image/bmp, image/gif">
            </div>
        </div>

        <div class="input-group">
            <label>Target color</label>
            <div class="color-picker-wrapper">
                <label for="colorPicker">#</label>
                <input type="color" id="colorPicker" value="#944A32">
            </div>
        </div>

        <button class="action-btn" id="downloadBtn" disabled>Download PNG</button>
    </div>

    <div class="canvas-area">
        <canvas id="imageCanvas"></canvas>
    </div>

    <div class="status-note">
        <span id="statusMessage">No image selected. Upload to begin.</span>
        <span class="hex-indicator" id="hexDisplay">#944A32</span>
    </div>

    <div class="footnote">
        <span>●</span> Color Changer
    </div>
</div>

<script>
    (function() {
        "use strict";

        const fileInput = document.getElementById('imageUpload');
        const colorPicker = document.getElementById('colorPicker');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const downloadBtn = document.getElementById('downloadBtn');
        const statusMessage = document.getElementById('statusMessage');
        const hexDisplay = document.getElementById('hexDisplay');

        let currentImage = null;
        let isImageLoaded = false;
        let currentColor = '#944A32';

        function updateHexDisplay(hex) {
            hexDisplay.textContent = hex.toUpperCase();
        }
        updateHexDisplay(currentColor);

        // ---------- Core recoloring: solid fill on non‑transparent pixels ----------
        function applySolidRecolor(image, colorHex) {
            if (!image || !image.complete || !image.naturalWidth) return;

            const w = image.naturalWidth;
            const h = image.naturalHeight;
            canvas.width = w;
            canvas.height = h;

            // Clear to fully transparent
            ctx.clearRect(0, 0, w, h);
            // Draw original image (preserves alpha)
            ctx.drawImage(image, 0, 0, w, h);

            // Replace color of all non‑transparent pixels with chosen color
            ctx.globalCompositeOperation = 'source-in';
            ctx.fillStyle = colorHex;
            ctx.fillRect(0, 0, w, h);

            // Reset composite
            ctx.globalCompositeOperation = 'source-over';

            downloadBtn.disabled = false;
            statusMessage.textContent = `Recolored · ${w}×${h} px · transparent background`;
        }

        function renderCanvas() {
            if (!currentImage || !isImageLoaded) {
                // Show placeholder (transparent canvas with subtle text)
                canvas.width = 360;
                canvas.height = 240;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '15px Inter, system-ui, sans-serif';
                ctx.fillStyle = '#4a4a4a';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Upload an image', canvas.width/2, canvas.height/2);
                downloadBtn.disabled = true;
                statusMessage.textContent = 'Waiting for image.';
                return;
            }
            applySolidRecolor(currentImage, currentColor);
        }

        // ---------- File handling ----------
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                statusMessage.textContent = 'Please select a valid image file.';
                return;
            }

            statusMessage.textContent = 'Loading image...';
            downloadBtn.disabled = true;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    isImageLoaded = true;
                    renderCanvas();
                    statusMessage.textContent = `Loaded · ${img.naturalWidth}×${img.naturalHeight} px`;
                };
                img.onerror = () => {
                    statusMessage.textContent = 'Error loading image. Try another.';
                    isImageLoaded = false;
                    currentImage = null;
                    renderCanvas();
                };
                img.src = e.target.result;
            };
            reader.onerror = () => {
                statusMessage.textContent = 'Failed to read file.';
            };
            reader.readAsDataURL(file);
        }

        // ---------- Color change ----------
        function handleColorChange(e) {
            const newColor = e.target.value;
            currentColor = newColor;
            updateHexDisplay(newColor);

            if (isImageLoaded && currentImage) {
                renderCanvas();
            }
        }

        // ---------- Download with transparency ----------
        function downloadCanvas() {
            if (!isImageLoaded || !currentImage) {
                statusMessage.textContent = 'No image to download.';
                return;
            }

            const link = document.createElement('a');
            link.download = `solid_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            statusMessage.textContent = 'PNG downloaded (transparent background).';
        }

        // ---------- Initialize ----------
        function initializeEmptyCanvas() {
            canvas.width = 360;
            canvas.height = 240;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = '15px Inter, system-ui, sans-serif';
            ctx.fillStyle = '#555';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⬆  Choose an image', canvas.width/2, canvas.height/2);
        }
        initializeEmptyCanvas();
        downloadBtn.disabled = true;
        statusMessage.textContent = 'Select an image to start.';

        fileInput.addEventListener('change', handleFileSelect);
        colorPicker.addEventListener('input', handleColorChange);
        downloadBtn.addEventListener('click', downloadCanvas);
    })();
</script>
</body>
</html>

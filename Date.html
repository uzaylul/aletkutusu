<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarih ve Tarayıcı Bilgisi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b0c0e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #1e1f22;
            border-radius: 20px;
            padding: 30px 35px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            border: 1px solid #3a3c42;
        }
        h2 {
            color: #f0e6d2;
            margin-bottom: 25px;
            font-weight: 400;
            border-bottom: 1px solid #3a3c42;
            padding-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .info-panel {
            background: #2b2d31;
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 25px;
            border-left: 5px solid #c47a5a;
        }
        .info-row {
            display: flex;
            margin-bottom: 10px;
            color: #ddd;
            font-size: 1rem;
            line-height: 1.5;
        }
        .info-label {
            width: 120px;
            font-weight: 600;
            color: #b0b3b8;
        }
        .info-value {
            flex: 1;
            color: #f2e9e1;
            word-break: break-word;
        }
        .date-highlight {
            background: #3a2c26;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            color: #ffd7b3;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            background: #944a32;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            flex: 1 1 180px;
            border: 1px solid #b86b4e;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #b35f44;
            transform: translateY(-2px);
            box-shadow: 0 8px 14px rgba(0,0,0,0.5);
            border-color: #d18a6e;
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }
        .btn.secondary {
            background: #3a414a;
            border-color: #5f6a75;
        }
        .btn.secondary:hover {
            background: #505b66;
            border-color: #7e8a97;
        }
        .footer-note {
            margin-top: 18px;
            font-size: 0.8rem;
            color: #8a8f96;
            text-align: center;
        }
        .copied-feedback {
            color: #b5d6b0;
            margin-left: 10px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📋 Tarayıcı & Tarih Paneli</h2>
    
    <!-- Bilgi gösterim alanı -->
    <div class="info-panel">
        <div class="info-row">
            <span class="info-label">🕒 Şu an:</span>
            <span class="info-value" id="currentDateTime">--.--.---- --:--</span>
        </div>
        <div class="info-row">
            <span class="info-label">🌐 Tarayıcı:</span>
            <span class="info-value" id="browserInfo">Yükleniyor...</span>
        </div>
        <div class="info-row">
            <span class="info-label">💻 Platform:</span>
            <span class="info-value" id="platformInfo">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">🗣️ Dil(ler):</span>
            <span class="info-value" id="languageInfo">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">📏 Ekran:</span>
            <span class="info-value" id="screenInfo">-</span>
        </div>
    </div>

    <!-- Butonlar -->
    <div class="button-group">
        <button class="btn" id="copyDateOnlyBtn">📅 Sadece Tarihi Kopyala</button>
        <button class="btn secondary" id="copyAllInfoBtn">📎 Tüm Bilgileri Kopyala</button>
    </div>
    <div class="footer-note">
        ⚡ Butona tıkla, panoya kopyalansın. (Klasörden açsan da çalışır)
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ----- DOM elementleri -----
        const dateTimeSpan = document.getElementById('currentDateTime');
        const browserSpan = document.getElementById('browserInfo');
        const platformSpan = document.getElementById('platformInfo');
        const languageSpan = document.getElementById('languageInfo');
        const screenSpan = document.getElementById('screenInfo');

        // ----- Yardımcı fonksiyon: Tarih formatla (GG.AA.YYYY SS:DD) -----
        function getFormattedDateTime() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            return `${day}.${month}.${year} ${hour}:${minute}`;
        }

        // ----- Tarayıcı bilgilerini çek ve ayrıştır -----
        function getBrowserDetails() {
            const ua = navigator.userAgent;
            let browserName = "Bilinmiyor";
            let browserVersion = "";

            // Basit tarayıcı tespiti (sırayla)
            if (ua.indexOf("Firefox") > -1) {
                browserName = "Firefox";
                browserVersion = ua.match(/Firefox\/([0-9.]+)/)?.[1] || "";
            } else if (ua.indexOf("Edg") > -1) {
                browserName = "Edge";
                browserVersion = ua.match(/Edg\/([0-9.]+)/)?.[1] || "";
            } else if (ua.indexOf("OPR") > -1 || ua.indexOf("Opera") > -1) {
                browserName = "Opera";
                browserVersion = ua.match(/(OPR|Opera)\/([0-9.]+)/)?.[2] || "";
            } else if (ua.indexOf("Chrome") > -1) {
                browserName = "Chrome";
                browserVersion = ua.match(/Chrome\/([0-9.]+)/)?.[1] || "";
            } else if (ua.indexOf("Safari") > -1) {
                browserName = "Safari";
                browserVersion = ua.match(/Version\/([0-9.]+)/)?.[1] || "";
            } else if (ua.indexOf("Trident") > -1 || ua.indexOf("MSIE") > -1) {
                browserName = "Internet Explorer";
                browserVersion = ua.match(/(MSIE |rv:)([0-9.]+)/)?.[2] || "";
            }

            const fullBrowserStr = browserVersion ? `${browserName} ${browserVersion}` : browserName;

            // Platform (işletim sistemi)
            let platform = navigator.platform || "Bilinmiyor";
            // Daha okunabilir hale getir
            if (platform.toLowerCase().includes("win")) platform = "Windows";
            else if (platform.toLowerCase().includes("mac")) platform = "macOS";
            else if (platform.toLowerCase().includes("linux")) platform = "Linux";
            else if (platform.toLowerCase().includes("android")) platform = "Android";
            else if (platform.toLowerCase().includes("iphone") || platform.toLowerCase().includes("ipad")) platform = "iOS";

            // Dil
            const language = navigator.language || navigator.userLanguage || "tr-TR";

            // Ekran çözünürlüğü
            const screenWidth = window.screen.width;
            const screenHeight = window.screen.height;
            const screenInfo = `${screenWidth}x${screenHeight} (${window.screen.colorDepth}-bit)`;

            return {
                browser: fullBrowserStr,
                platform: platform,
                language: language,
                screen: screenInfo,
                userAgent: ua  // yedek
            };
        }

        // ----- Bilgileri ekrana yaz -----
        function updateDisplay() {
            const dateTimeStr = getFormattedDateTime();
            dateTimeSpan.textContent = dateTimeStr;

            const details = getBrowserDetails();
            browserSpan.textContent = details.browser;
            platformSpan.textContent = details.platform;
            languageSpan.textContent = details.language;
            screenSpan.textContent = details.screen;
        }

        // İlk yüklemede göster
        updateDisplay();

        // Her dakika tarih saat güncellensin (opsiyonel)
        setInterval(() => {
            dateTimeSpan.textContent = getFormattedDateTime();
        }, 1000); // saniyede bir değişsin, daha canlı

        // ----- Kopyalama işlemleri (async/await + fallback) -----
        async function copyToClipboard(text, successMessage) {
            try {
                await navigator.clipboard.writeText(text);
                alert(`✅ ${successMessage || 'Kopyalandı!'}\n\n"${text}"`);
                return true;
            } catch (err) {
                // fallback: textarea yöntemi
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        alert(`✅ (Fallback) ${successMessage || 'Kopyalandı!'}\n\n"${text}"`);
                    } else {
                        throw new Error('execCommand başarısız');
                    }
                } catch (e) {
                    console.error('Kopyalama hatası:', e);
                    alert('❌ Panoya kopyalanamadı. Lütfen manuel kopyalayın.');
                } finally {
                    document.body.removeChild(textarea);
                }
                return false;
            }
        }

        // ----- Sadece tarih/saat metnini oluştur -----
        function getDateOnlyText() {
            return getFormattedDateTime();
        }

        // ----- Tüm bilgileri (tarih + tarayıcı) birleştir -----
        function getAllInfoText() {
            const dateStr = getFormattedDateTime();
            const details = getBrowserDetails();
            return `Tarih/Saat: ${dateStr}
Tarayıcı: ${details.browser}
Platform: ${details.platform}
Dil: ${details.language}
Ekran: ${details.screen}
User Agent: ${details.userAgent}`;
        }

        // ----- Buton olayları -----
        document.getElementById('copyDateOnlyBtn').addEventListener('click', function() {
            const text = getDateOnlyText();
            copyToClipboard(text, 'Tarih ve saat panoya kopyalandı');
        });

        document.getElementById('copyAllInfoBtn').addEventListener('click', function() {
            const text = getAllInfoText();
            copyToClipboard(text, 'Tarih ve tarayıcı bilgileri kopyalandı');
        });

        // Sayfa yüklendiğinde tarih bilgisi güncellenmiş olsun (ilk an)
        // ve ekstra güvence: ekran bilgisi resize'da değişmez ama tutarlı.

        // Opsiyonel: Kullanıcı dil değişirse vs. güncelleme yapmaya gerek yok.
        // Ancak tarayıcı bilgileri statik, yine de güncel tutmak için butona tıklanınca tekrar okur.

        // Eğer ekran dönerse ekran bilgisini güncellemek isteyebiliriz:
        window.addEventListener('resize', () => {
            // Ekran boyutu değişmez (screen.width/height sabit) ama yine de güncelleyelim.
            const details = getBrowserDetails();
            screenSpan.textContent = details.screen;
        });

        // İlk açılışta bir kez daha tüm alanları doldur (zaten updateDisplay yaptık)
        // Ama güvenlik için:
        window.addEventListener('load', function() {
            updateDisplay();
        });

    })();
</script>
</body>
</html>
